services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: community
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-community}
    ports:
      - "5433:5432"
    volumes:
      - community_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d community"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: node:24-alpine
    working_dir: /app
    profiles: ["tools"]
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://community:${POSTGRES_PASSWORD:-community}@db:5432/community
    command: ["sh", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm db:migrate"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://community:${POSTGRES_PASSWORD:-community}@db:5432/community
    ports:
      - "3020:3020"
    depends_on:
      db:
        condition: service_healthy

volumes:
  community_db:
